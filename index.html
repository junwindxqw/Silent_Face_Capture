<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>30秒识别测试</title>
  <link rel="stylesheet" href="./styles.css?v=2026063003">
</head>
<body>
  <main class="page">
    <section class="test-panel">
      <button id="startBtn" class="start-btn" type="button">开始30秒的识别测试</button>
      <div id="statusText" class="status">点击按钮开始测试</div>
      <div id="countdownText" class="countdown">00:30</div>
    </section>

    <section class="photos-section" aria-label="测试抓拍照片">
      <h1>随机抓拍照片</h1>
      <div id="photosGrid" class="photos-grid">
        <div class="photo-placeholder">等待第 1 张照片</div>
        <div class="photo-placeholder">等待第 2 张照片</div>
      </div>
    </section>
  </main>

  <video id="cameraVideo" class="camera-video" playsinline muted></video>
  <canvas id="captureCanvas" class="capture-canvas"></canvas>

  <script src="./app.js?v=2026063003"></script>
</body>
</html>
